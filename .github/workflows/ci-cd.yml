name: Fullstack CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. KIỂM TRA VÀ BUILD BACKEND (Java Spring Boot)
  backend-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build Backend with Maven
      working-directory: ./javabackend
      run: ./mvnw clean package -DskipTests
      # Lưu ý: Bỏ -DskipTests nếu bạn có viết Unit Test và muốn CI chạy test

  # 2. KIỂM TRA VÀ BUILD FRONTEND (React Vite)
  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./project/package-lock.json

    - name: Install Dependencies
      working-directory: ./project
      run: npm ci

    - name: Build Frontend
      working-directory: ./project
      run: npm run build

  # 3. TEST DOCKER BUILD (Đảm bảo Dockerfile viết đúng)
  docker-build-test:
    needs: [backend-build, frontend-build]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Test Build Docker Compose
      run: docker-compose build

